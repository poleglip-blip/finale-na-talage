<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mario Maze Race - MEGA ARCADE</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">

<style>
:root { 
    --mario: #ff0000; --luigi: #44bd32; --peach: #ff9ff3; --wario: #f1c40f; --waluigi: #8c7ae6; 
}
* { font-family: 'Press Start 2P', cursive; box-sizing: border-box; }

body, html { margin:0; padding:0; width:100%; height:100%; overflow:hidden; background:#5c94fc; }

#bg-layer {
    position:fixed; inset:0;
    background-image:url('title_bg.png');
    background-size:cover;
    z-index:1;
}

.screen {
    position:absolute; inset:0;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,0.7);
    z-index:1000;
}

.selection-wrapper {
    display:flex; gap:40px;
    background:#fff;
    padding:30px;
    border:8px solid #000;
}

.p-select-box { width:400px; text-align:center; }

.char-grid {
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
}

.char-card {
    background:#eee;
    padding:10px;
    border:5px solid #999;
    cursor:pointer;
}

.char-card img {
    height:100px;
    image-rendering:pixelated;
}

#game-container {
    position:absolute;
    inset:0;
    display:none;
    flex-direction:column;
}

.race-track {
    height:220px;
    width:100%;
    border-bottom:40px solid #8B4513;
    position:relative;
}

.runner {
    position:absolute;
    bottom:0;
    left:0%;
    height:140px;
    transition:left 0.8s;
}

.quiz-area {
    display:flex;
    gap:20px;
    padding:10px;
}

.p-box {
    flex:1;
    background:#fff;
    border:6px solid #000;
    padding:20px;
    text-align:center;
}

.opt-btn {
    margin:5px;
    padding:15px;
    border:4px solid #000;
    background:#f1c40f;
    cursor:pointer;
}
</style>
</head>

<body>

<div id="bg-layer"></div>

<!-- TITLE -->
<div id="title-screen" class="screen">
    <h1 style="color:white;">MEGA MAZE RACE</h1>
    <button onclick="openSelection()">START</button>
</div>

<!-- SELECT -->
<div id="select-screen" class="screen" style="display:none;">
    <h2 style="color:white;">SELECT CHARACTER</h2>

    <div class="selection-wrapper">
        <div class="p-select-box">
            <h3>PLAYER 1</h3>
            <div id="grid1" class="char-grid"></div>
        </div>

        <div class="p-select-box">
            <h3>PLAYER 2</h3>
            <div id="grid2" class="char-grid"></div>
        </div>
    </div>

    <button id="race-btn" style="display:none;" onclick="startRace()">START</button>
</div>

<!-- GAME -->
<div id="game-container">

    <div class="race-track">
        <img id="p1-sprite" class="runner">
    </div>

    <div class="race-track">
        <img id="p2-sprite" class="runner">
    </div>

    <div class="quiz-area">

        <div class="p-box">
            <h3 id="p1-q"></h3>
            <div id="p1-opts"></div>
        </div>

        <div class="p-box">
            <h3 id="p2-q"></h3>
            <div id="p2-opts"></div>
        </div>

    </div>
</div>

<script>

const characters = [
    { name:"MARIO", file:"mario.gif", color:"red" },
    { name:"LUIGI", file:"luigi.gif", color:"green" },
    { name:"PEACH", file:"peach.gif", color:"pink" },
    { name:"WARIO", file:"wario.gif", color:"yellow" },
    { name:"WALUIGI", file:"waluigi.gif", color:"purple" }
];

const questionBank = [
    {
        q:"How to keep your tummy healthy?（怎麼讓腸胃健康？）",
        a:"Drink water（喝水）",
        o:["Drink water（喝水）","Eat old food（吃過期食物）","No exercise（不運動）"]
    },
    {
        q:"Which is a good poo?（哪個是健康的便便？）",
        a:"Soft（柔軟）",
        o:["Soft（柔軟）","Hard（很硬）","Watery（很水）"]
    },
    {
        q:"Why constipation happens?（為什麼會便秘？）",
        a:"Not enough water（水不夠）",
        o:["Not enough water（水不夠）","Too many fruits（太多水果）","Too much exercise（太多運動）"]
    },
    {
        q:"Who helps with medicine?（誰幫助用藥？）",
        a:"Pharmacist（藥師）",
        o:["Pharmacist（藥師）","Teacher（老師）","Chef（廚師）"]
    },
    {
        q:"What to do before eating?（吃東西前要做什麼？）",
        a:"Wash hands（洗手）",
        o:["Wash hands（洗手）","Sleep（睡覺）","Play（玩）"]
    }
];

let p1Char, p2Char;
let p1Pos = 0, p2Pos = 0;

// CHARACTER SELECT
function openSelection(){
    document.getElementById('title-screen').style.display='none';
    document.getElementById('select-screen').style.display='flex';

    [1,2].forEach(p=>{
        const grid=document.getElementById('grid'+p);
        grid.innerHTML='';

        characters.forEach(c=>{
            const card=document.createElement('div');
            card.className='char-card';

            card.innerHTML=`
                <img src="${c.file}">
                <div>${c.name}</div>
            `;

            card.onclick=()=>{
                if(p===1) p1Char=c;
                else p2Char=c;

                card.style.border="5px solid black";

                if(p1Char && p2Char){
                    document.getElementById('race-btn').style.display='block';
                }
            };

            grid.appendChild(card);
        });
    });
}

// START GAME
function startRace(){
    document.getElementById('select-screen').style.display='none';
    document.getElementById('game-container').style.display='flex';

    document.getElementById('p1-sprite').src=p1Char.file;
    document.getElementById('p2-sprite').src=p2Char.file;

    loadQ(1);
    loadQ(2);
}

// QUESTIONS
function loadQ(p){
    const q = questionBank[Math.floor(Math.random()*questionBank.length)];

    document.getElementById(`p${p}-q`).innerText = q.q;

    const box = document.getElementById(`p${p}-opts`);
    box.innerHTML='';

    q.o.forEach(opt=>{
        const btn=document.createElement('button');
        btn.className='opt-btn';
        btn.innerText=opt;

        btn.onclick=()=>{
            if(opt===q.a){
                move(p);
            }
            loadQ(p);
        };

        box.appendChild(btn);
    });
}

// MOVE
function move(p){
    if(p===1){
        p1Pos+=10;
        document.getElementById('p1-sprite').style.left=p1Pos+'%';
    } else {
        p2Pos+=10;
        document.getElementById('p2-sprite').style.left=p2Pos+'%';
    }
}

</script>

</body>
</html>
